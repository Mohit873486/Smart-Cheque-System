<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheque Preview</title>
<style>
* { box-sizing: border-box; }
html,
body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, "Segoe UI", sans-serif;
}
.sheet {
  width: 216mm;
  height: 93mm;
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(rgba(255,255,255,0.70), rgba(255,255,255,0.70)),
    repeating-linear-gradient(45deg, rgba(18,94,151,0.055) 0 4px, transparent 4px 12px),
    repeating-linear-gradient(-45deg, rgba(229,181,65,0.045) 0 3px, transparent 3px 14px),
    #fffdf5;
  border: 0.45mm solid #d7d7d7;
  color: #111111;
}
.sheet::before {
  content: "";
  position: absolute;
  inset: 3mm;
  border: 0.25mm solid #ececec;
  pointer-events: none;
}
.bank-header {
  position: absolute;
  left: 13mm;
  top: 8mm;
  width: 55mm;
  min-height: 9mm;
  display: flex;
  align-items: flex-start;
  gap: 5mm;
  z-index: 2;
}
.bank-mark {
  font-size: 14pt;
  line-height: 1;
  font-weight: 800;
  color: #0f172a;
}
.bank-name {
  font-size: 12pt;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  white-space: nowrap;
}
.branch-copy {
  display: none;
  padding-left: 5mm;
  border-left: 0.2mm solid #d8d8d8;
  font-size: 5.5pt;
  line-height: 1.35;
  color: #303030;
  max-width: 48mm;
}
.cheque-no {
  position: absolute;
  right: 12mm;
  top: 8mm;
  font-size: 6pt;
  color: #444444;
}
.date-zone {
  position: absolute;
  right: 12mm;
  top: 8mm;
  width: 42mm;
  text-align: center;
  z-index: 2;
}
.date-boxes {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  height: 8mm;
  border-left: 0.25mm solid #808080;
  border-top: 0.25mm solid #808080;
}
.date-boxes span {
  border-right: 0.25mm solid #808080;
  border-bottom: 0.25mm solid #808080;
  font-size: 7pt;
  line-height: 7.5mm;
  font-weight: 700;
}
.date-format {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  margin-top: 1mm;
  font-size: 5pt;
  letter-spacing: 0.3mm;
  color: #111111;
}
.bearer {
  position: absolute;
  top: 26mm;
  right: 13mm;
  font-size: 7pt;
  letter-spacing: 0.3px;
}
.static-label {
  position: absolute;
  left: 13mm;
  font-size: 7.5pt;
  font-weight: 700;
  letter-spacing: 0.4px;
  z-index: 2;
}
.label-pay { top: 25mm; }
.label-words { top: 36mm; }
.label-account { top: 55mm; }
.pay-line,
.words-line,
.words-line-2 {
  position: absolute;
  border-bottom: 0.28mm solid #8c8c8c;
  z-index: 1;
}
.pay-line {
  left: 26mm;
  right: 13mm;
  top: 30mm;
}
.words-line {
  left: 26mm;
  right: 66mm;
  top: 41mm;
}
.words-line-2 {
  left: 13mm;
  right: 66mm;
  top: 49mm;
}
.account-box {
  position: absolute;
  left: 13mm;
  top: 61mm;
  width: 83mm;
  height: 9mm;
  border: 0.3mm solid #a0a0a0;
  background: rgba(255,255,255,0.55);
}
.account-caption {
  position: absolute;
  left: 14mm;
  top: 63.2mm;
  padding: 0 2mm;
  background: rgba(255,255,255,0.78);
  font-size: 6.5pt;
  font-weight: 700;
}
.amount-outline {
  position: absolute;
  right: 13mm;
  top: 40mm;
  width: 47mm;
  height: 12mm;
  border: 0.35mm solid #9d9d9d;
  background: rgba(255,255,255,0.58);
}
.rupee-symbol {
  position: absolute;
  left: 1.5mm;
  top: 1.8mm;
  width: 9mm;
  height: 8mm;
  border-right: 0.25mm solid #adadad;
  font-size: 10pt;
  line-height: 8mm;
  text-align: center;
  font-weight: 700;
}
.signature-guide {
  position: absolute;
  right: 13mm;
  top: 65mm;
  width: 47mm;
  border-top: 0.3mm solid #8a8a8a;
  text-align: center;
  padding-top: 2mm;
  font-size: 6.5pt;
  letter-spacing: 0.2px;
}
.micr-band {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 12mm;
  background: rgba(255,255,255,0.35);
}
.field-anchor {
  position: absolute;
  z-index: 4;
  color: #050505;
}
.date-field {
  display: none;
}
.pay-field {
  width: 143mm;
}
.pay-row,
.words-row {
  display: flex;
  align-items: center;
}
.pay-row .field-label,
.words-row .field-label,
.amount-box .field-label {
  display: none;
}
.line-value {
  width: 100%;
  min-height: 7mm;
  border: 0;
  color: #050505;
}
.pay-row .line-value {
  font-size: 12pt;
  font-weight: 700;
  padding-top: 0.5mm;
}
.words-field {
  width: 133mm;
}
.words-row .line-value {
  font-size: 10.5pt;
  font-weight: 600;
}
.amount-box {
  width: 34mm;
  height: 10mm;
}
.amount-value {
  border: 0;
  height: 10mm;
  text-align: center;
  font-size: 13pt;
  line-height: 9.5mm;
  font-weight: 800;
}
.signature-field {
  width: 47mm;
  text-align: center;
}
.signature-photo {
  object-fit: contain;
  margin: 0 auto;
  max-width: 100%;
}
.signature-line,
.signature-label {
  display: none;
}
.micr {
  position: absolute;
  bottom: auto;
  transform: translateX(-50%);
  font-family: Consolas, "Courier New", monospace;
  letter-spacing: 1.5mm;
  font-size: 13pt;
  color: #111111;
  white-space: nowrap;
  z-index: 3;
}
@media print {
  html,
  body {
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
  }
  .sheet {
    border: 0;
  }
}
</style>
</head>
<body>
  <div class="sheet" data-width-mm="{{DOC_WIDTH_MM}}" data-height-mm="{{DOC_HEIGHT_MM}}">
    <div class="bank-header" data-left="{{BANK_LEFT}}" data-top="{{BANK_TOP}}" data-width="{{BANK_WIDTH}}" data-height="{{BANK_HEIGHT}}">
      <div class="bank-mark">⌃</div>
      <div>
        <div class="bank-name">{{BANK_NAME}}</div>
      </div>
      <div class="branch-copy">
        Branch Name<br>
        Address line / IFSC details<br>
        Goes here
      </div>
    </div>

    <div class="cheque-no">Cheque No: {{CHEQUE_NO}}</div>

    <div class="date-zone" data-left="{{DATE_LEFT}}" data-top="{{DATE_TOP}}" data-width="{{DATE_WIDTH}}" data-height="{{DATE_HEIGHT}}">
      <div class="date-boxes" data-date="{{ISSUE_DATE}}">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="date-format">
        <span>D</span><span>D</span><span>M</span><span>M</span>
        <span>Y</span><span>Y</span><span>Y</span><span>Y</span>
      </div>
    </div>

    <div class="bearer">OR BEARER</div>
    <div class="static-label label-pay">PAY</div>
    <div class="static-label label-words">SUM OF</div>
    <div class="static-label label-account">Acc. No.</div>
    <div class="pay-line"></div>
    <div class="words-line"></div>
    <div class="words-line-2"></div>
    <div class="account-box"></div>
    <div class="account-caption">Acc. No.</div>
    <div class="amount-outline"><div class="rupee-symbol">₹</div></div>
    <div class="signature-guide">Please Sign Above</div>
    <div class="micr-band"></div>

    <div class="field-anchor pay-field" data-left="{{PAYEE_LEFT}}" data-top="{{PAYEE_TOP}}" data-width="{{PAYEE_WIDTH}}" data-height="{{PAYEE_HEIGHT}}">
      <div class="pay-row">
        <span class="field-label">Pay:</span>
        <div class="line-value">{{PAYEE}}</div>
      </div>
    </div>

    <div class="field-anchor words-field" data-left="{{WORDS_LEFT}}" data-top="{{WORDS_TOP}}" data-width="{{WORDS_WIDTH}}" data-height="{{WORDS_HEIGHT}}">
      <div class="words-row">
        <span class="field-label">Rupees:</span>
        <div class="line-value">{{AMOUNT_WORDS}}</div>
      </div>
    </div>

    <div class="field-anchor amount-box" data-left="{{NUMBER_LEFT}}" data-top="{{NUMBER_TOP}}" data-width="{{NUMBER_WIDTH}}" data-height="{{NUMBER_HEIGHT}}">
      <div class="field-label">Amount</div>
      <div class="amount-value">{{AMOUNT_NUMBER}}</div>
    </div>

    <div class="field-anchor signature-field" data-left="{{SIGN_LEFT}}" data-top="{{SIGN_TOP}}" data-width="{{SIGN_FIELD_WIDTH}}" data-height="{{SIGN_FIELD_HEIGHT}}">
      <img class="signature-photo"
           src="{{SIGN_SRC}}"
           data-width="{{SIGN_WIDTH}}"
           data-height="{{SIGN_HEIGHT}}"
           data-display="{{SIGN_DISPLAY}}"
           data-offset-x="{{SIGN_OFFSET_X}}"
           data-offset-y="{{SIGN_OFFSET_Y}}" />
      <div class="signature-line"></div>
      <div class="signature-label" data-display="{{SIGN_LABEL_DISPLAY}}">Authorised Signature</div>
    </div>

    <div class="micr" data-left="{{MICR_LEFT}}" data-top="{{MICR_TOP}}" data-width="{{MICR_WIDTH}}" data-height="{{MICR_HEIGHT}}">{{MICR_TEXT}}</div>
  </div>
  <script>
    (function () {
      var sheet = document.querySelector('.sheet');
      if (!sheet) return;

      var widthMm = sheet.getAttribute('data-width-mm');
      var heightMm = sheet.getAttribute('data-height-mm');
      if (widthMm) sheet.style.width = widthMm + 'mm';
      if (heightMm) sheet.style.height = heightMm + 'mm';

      function cssLengthToPx(value, axisSize) {
        if (!value) return 0;
        value = String(value).trim();
        if (value.indexOf('%') > -1) {
          return (parseFloat(value) || 0) * axisSize / 100;
        }
        return parseFloat(value) || 0;
      }

      function keepInsideSheet(el) {
        var margin = 8;
        var left = cssLengthToPx(el.style.left, sheet.clientWidth);
        var top = cssLengthToPx(el.style.top, sheet.clientHeight);
        var maxLeft = Math.max(margin, sheet.clientWidth - el.offsetWidth - margin);
        var maxTop = Math.max(margin, sheet.clientHeight - el.offsetHeight - margin);

        left = Math.min(Math.max(margin, left), maxLeft);
        top = Math.min(Math.max(0, top), maxTop);

        el.style.left = left + 'px';
        el.style.top = top + 'px';
      }

      function fillDateBoxes() {
        var boxes = document.querySelectorAll('.date-boxes span');
        var raw = document.querySelector('.date-boxes').getAttribute('data-date') || '';
        var digits = raw.replace(/\D/g, '');
        if (digits.length === 8 && raw.indexOf('-') === 4) {
          digits = digits.substring(6, 8) + digits.substring(4, 6) + digits.substring(0, 4);
        }
        for (var i = 0; i < boxes.length; i++) {
          boxes[i].textContent = digits.charAt(i) || '';
        }
      }

      document.querySelectorAll('[data-left][data-top]').forEach(function (el) {
        var left = el.getAttribute('data-left');
        var top = el.getAttribute('data-top');
        var fieldWidth = el.getAttribute('data-width');
        var fieldHeight = el.getAttribute('data-height');
        if (left) el.style.left = left;
        if (top) el.style.top = top;
        if (fieldWidth) el.style.width = fieldWidth;
        if (fieldHeight) el.style.height = fieldHeight;
        keepInsideSheet(el);
      });

      var sig = document.querySelector('.signature-photo');
      if (sig) {
        var sigWidth = sig.getAttribute('data-width');
        var sigHeight = sig.getAttribute('data-height');
        var sigDisplay = sig.getAttribute('data-display');
        var sigOffsetX = sig.getAttribute('data-offset-x');
        var sigOffsetY = sig.getAttribute('data-offset-y');
        if (sigWidth) sig.style.width = sigWidth;
        if (sigHeight) sig.style.height = sigHeight;
        if (sigDisplay) sig.style.display = sigDisplay;
        if (sigOffsetX) sig.style.marginLeft = sigOffsetX;
        if (sigOffsetY) sig.style.marginTop = sigOffsetY;
      }

      var micr = document.querySelector('.micr[data-left]');
      if (micr) {
        var micrLeft = micr.getAttribute('data-left');
        if (micrLeft) micr.style.left = micrLeft;
      }

      fillDateBoxes();
    })();
  </script>
</body>
</html>
