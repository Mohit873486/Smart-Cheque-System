<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheque Preview</title>
<style>
:root {
  --sheet-width-mm: {{DOC_WIDTH_MM}};
  --sheet-height-mm: {{DOC_HEIGHT_MM}};
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #dde3ec;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sheet {
  width: calc(var(--sheet-width-mm) * 1mm);
  height: calc(var(--sheet-height-mm) * 1mm);
  background: #ffffff;
  border: 1px solid #1f56d6;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 30px rgba(15,23,42,.16);
}
.header {
  height: 14%;
  background: #1f56d6;
  color: #ffffff;
  padding: 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .2px;
}
.grid-line {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 1px solid #94a3b8;
}
.field {
  position: absolute;
  transform: translate(-50%, -50%);
  color: #111827;
}
.label {
  display: block;
  font-size: 10px;
  color: #0f172a;
  margin-bottom: 2px;
  font-weight: 700;
  text-transform: uppercase;
}
.value {
  font-size: 12px;
  font-weight: 600;
  border-bottom: 1px solid #64748b;
  min-width: 180px;
  white-space: nowrap;
}
.amount-box .value {
  border: 1px solid #1f56d6;
  min-width: 86px;
  text-align: right;
  padding: 4px 8px;
}
.signature .value {
  min-width: 150px;
  text-align: center;
  font-style: italic;
  font-size: 11px;
}
.micr {
  position: absolute;
  transform: translate(-50%, -50%);
  font-family: Consolas, "Courier New", monospace;
  letter-spacing: 1px;
  font-size: 15px;
  color: #111827;
}
.footer-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 13%;
  background: #e2e8f0;
}
</style>
</head>
<body>
  <div class="sheet">
    <div class="header">
      <div>BANK: {{BANK_NAME}}</div>
      <div>Cheque No: {{CHEQUE_NO}}</div>
    </div>

    <div class="grid-line" style="top: 26%;"></div>
    <div class="grid-line" style="top: 42%;"></div>

    <div class="field" style="left: {{DATE_LEFT}}; top: {{DATE_TOP}};">
      <span class="label">Date</span>
      <div class="value">{{ISSUE_DATE}}</div>
    </div>

    <div class="field" style="left: {{PAYEE_LEFT}}; top: {{PAYEE_TOP}};">
      <span class="label">Pay</span>
      <div class="value">{{PAYEE}}</div>
    </div>

    <div class="field" style="left: {{WORDS_LEFT}}; top: {{WORDS_TOP}};">
      <span class="label">Rupees</span>
      <div class="value">{{AMOUNT_WORDS}}</div>
    </div>

    <div class="field amount-box" style="left: {{NUMBER_LEFT}}; top: {{NUMBER_TOP}};">
      <span class="label">Amount</span>
      <div class="value">{{AMOUNT_NUMBER}}</div>
    </div>

    <div class="field signature" style="left: {{SIGN_LEFT}}; top: {{SIGN_TOP}};">
      <div class="value">Authorised Signature</div>
    </div>

    <div class="micr" style="left: {{MICR_LEFT}}; top: {{MICR_TOP}};">{{MICR_TEXT}}</div>

    <div class="footer-strip"></div>
  </div>
</body>
</html>
