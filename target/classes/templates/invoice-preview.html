<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice Preview</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  background: #dee6f0;
  font-family: "Segoe UI", Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.paper {
  width: 210mm;
  min-height: 297mm;
  background: #ffffff;
  box-shadow: 0 12px 30px rgba(15,23,42,.16);
  padding: 18mm 14mm;
  color: #0f172a;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  border-bottom: 2px solid #1d4ed8;
  padding-bottom: 8mm;
  margin-bottom: 8mm;
}
.title { font-size: 30px; font-weight: 800; color: #1e3a8a; }
.meta { text-align: right; font-size: 12px; color: #334155; }
.section { margin-bottom: 7mm; }
.row { display: flex; justify-content: space-between; margin: 3mm 0; }
.label { color: #475569; font-size: 12px; font-weight: 700; }
.value { color: #0f172a; font-size: 13px; font-weight: 600; }
.total-box {
  margin-top: 8mm;
  background: linear-gradient(135deg, #eff6ff, #dbeafe);
  border: 1px solid #bfdbfe;
  border-radius: 10px;
  padding: 6mm;
}
.total-value { font-size: 26px; color: #1d4ed8; font-weight: 800; }
.notes {
  margin-top: 9mm;
  border-top: 1px dashed #94a3b8;
  padding-top: 5mm;
  color: #334155;
  font-size: 12px;
  line-height: 1.5;
}
</style>
</head>
<body>
  <div class="paper">
    <div class="header">
      <div>
        <div class="title">Invoice</div>
        <div class="label">Invoice No: {{INVOICE_NO}}</div>
      </div>
      <div class="meta">
        <div><strong>Status:</strong> {{STATUS}}</div>
      </div>
    </div>

    <div class="section">
      <div class="row"><div class="label">Client</div><div class="value">{{CLIENT}}</div></div>
      <div class="row"><div class="label">Issue Date</div><div class="value">{{ISSUE_DATE}}</div></div>
      <div class="row"><div class="label">Due Date</div><div class="value">{{DUE_DATE}}</div></div>
    </div>

    <div class="total-box">
      <div class="label">Amount</div>
      <div class="total-value">INR {{AMOUNT}}</div>
    </div>

    <div class="notes">
      <div class="label">Notes</div>
      <div>{{NOTES}}</div>
    </div>
  </div>
</body>
</html>
