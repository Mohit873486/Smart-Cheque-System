<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice Preview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

* { box-sizing: border-box; }
body {
  margin: 0;
  background: #f1f5f9;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 0;
}
.paper {
  width: 210mm;
  min-height: 297mm;
  background: #ffffff;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  padding: 24mm 20mm;
  color: #1e293b;
  display: flex;
  flex-direction: column;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 2px solid #f1f5f9;
  padding-bottom: 20px;
  margin-bottom: 28px;
}
.title-area {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.title { 
  font-size: 32px; 
  font-weight: 800; 
  color: #1e3a8a; 
  letter-spacing: -0.5px;
}
.invoice-no-badge {
  font-size: 12px;
  font-weight: 600;
  color: #64748b;
}

.status-badge {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 9999px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.status-Paid {
  background-color: #dcfce7;
  color: #15803d;
}
.status-Unpaid {
  background-color: #fee2e2;
  color: #b91c1c;
}
.status-Partial {
  background-color: #fef3c7;
  color: #b45309;
}
.status-Cancelled {
  background-color: #f1f5f9;
  color: #475569;
}

.metadata-card {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 28px;
}
.meta-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.meta-label {
  font-size: 10.5px;
  font-weight: 800;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.meta-val {
  font-size: 13.5px;
  font-weight: 600;
  color: #0f172a;
}

.amount-card {
  background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
  border-radius: 16px;
  padding: 26px;
  color: #ffffff;
  box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.12), 0 4px 6px -2px rgba(30, 58, 138, 0.08);
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}
.amount-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 250px;
  height: 250px;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 50%;
  pointer-events: none;
}
.amount-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.amount-title {
  font-size: 12px;
  font-weight: 600;
  color: #93c5fd;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.currency-badge {
  background: rgba(255, 255, 255, 0.15);
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.amount-value {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #ffffff;
  position: relative;
  z-index: 1;
}

.notes-card {
  background: #f8fafc;
  border-left: 4px solid #94a3b8;
  border-radius: 4px 12px 12px 4px;
  padding: 18px 22px;
  margin-top: auto;
}
.notes-title {
  font-size: 11.5px;
  font-weight: 800;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
.notes-content {
  font-size: 13px;
  color: #475569;
  line-height: 1.6;
  font-style: italic;
}
</style>
</head>
<body>
  <div class="paper">
    <div class="header">
      <div class="title-area">
        <div class="title">INVOICE</div>
        <div class="invoice-no-badge">Invoice No: {{INVOICE_NO}}</div>
      </div>
      <div>
        <span class="status-badge status-{{STATUS}}">{{STATUS}}</span>
      </div>
    </div>

    <div class="metadata-card">
      <div class="meta-item">
        <span class="meta-label">Client</span>
        <span class="meta-val">{{CLIENT}}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Issue Date</span>
        <span class="meta-val">{{ISSUE_DATE}}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Due Date</span>
        <span class="meta-val">{{DUE_DATE}}</span>
      </div>
    </div>

    <div class="amount-card">
      <div class="amount-header">
        <span class="amount-title">Total Amount Due</span>
        <span class="currency-badge">INR</span>
      </div>
      <div class="amount-value" id="amount-value">{{AMOUNT}}</div>
    </div>

    <div class="notes-card">
      <div class="notes-title">Notes</div>
      <div class="notes-content">{{NOTES}}</div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const amtEl = document.getElementById("amount-value");
      if (amtEl) {
        const raw = parseFloat(amtEl.innerText);
        if (!isNaN(raw)) {
          amtEl.innerText = new Intl.NumberFormat('en-IN', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
          }).format(raw);
        }
      }
    });
  </script>
</body>
</html>
